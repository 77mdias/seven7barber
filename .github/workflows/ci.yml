name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Lint Web
      run: cd seven7barber-web && bun run lint
      continue-on-error: true

    - name: Build Web
      run: cd seven7barber-web && bun run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:3000

    - name: Test API
      run: cd seven7barber-api && bun run test
