on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: cd seven7barber-api && bun test --verbose

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: cd seven7barber-api && bun run build

      - name: Build Docker image
        run: |
          docker build -t seven7barber-api:latest ./seven7barber-api
          docker save seven7barber-api:latest > api-image.tar

      - name: Upload API image
        uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: api-image.tar

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: cd seven7barber-web && bun run build

      - name: Build Docker image
        run: |
          docker build -t seven7barber-web:latest ./seven7barber-web
          docker save seven7barber-web:latest > web-image.tar

      - name: Upload Web image
        uses: actions/upload-artifact@v4
        with:
          name: web-image
          path: web-image.tar

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API image
        uses: actions/download-artifact@v4
        with:
          name: api-image
          path: .

      - name: Download Web image
        uses: actions/download-artifact@v4
        with:
          name: web-image
          path: .

      - name: Load Docker images
        run: |
          docker load < api-image.tar
          docker load < web-image.tar

      - name: Deploy to server
        run: |
          echo "Deploying to production server..."
          # In real deployment, this would SSH to server and run docker-compose
          # docker-compose -f docker-compose.prod.yml up -d
          echo "Deployment complete"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CLOUDINARY_CLOUD: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD }}
