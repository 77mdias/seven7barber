name: Deploy Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancelar runs anteriores do mesmo branch/PR
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1: Quality Gates (lint, type-check, test)
  # ============================================================
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            seven7barber-api/node_modules
            seven7barber-web/node_modules
          key: deps-${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd seven7barber-api && bunx prisma generate

      - name: Lint API
        run: cd seven7barber-api && bun run lint
        continue-on-error: true

      - name: Type-check API
        run: cd seven7barber-api && bun run type-check
        continue-on-error: true

      - name: Lint Web
        run: cd seven7barber-web && bun run lint
        continue-on-error: true

      - name: Type-check Web
        run: cd seven7barber-web && bun run type-check
        continue-on-error: true

      - name: Run API tests
        run: cd seven7barber-api && bun run test -- --forceExit --detectOpenHandles

      - name: Run API build
        run: cd seven7barber-api && bun run build

  # ============================================================
  # JOB 2: Build Docker images
  # ============================================================
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            seven7barber-api/node_modules
          key: deps-${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-bun-

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./seven7barber-api
          push: false
          load: true
          tags: seven7barber-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save API image
        run: docker save seven7barber-api:${{ github.sha }} > api-image.tar

      - name: Upload API image
        uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: api-image.tar
          retention-days: 1

  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            seven7barber-web/node_modules
          key: deps-${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./seven7barber-web
          push: false
          load: true
          tags: seven7barber-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Web image
        run: docker save seven7barber-web:${{ github.sha }} > web-image.tar

      - name: Upload Web image
        uses: actions/upload-artifact@v4
        with:
          name: web-image
          path: web-image.tar
          retention-days: 1

  # ============================================================
  # JOB 3: Deploy to Production (apenas no main)
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API image
        uses: actions/download-artifact@v4
        with:
          name: api-image
          path: .

      - name: Download Web image
        uses: actions/download-artifact@v4
        with:
          name: web-image
          path: .

      - name: Load Docker images
        run: |
          docker load < api-image.tar
          docker load < web-image.tar

      - name: Deploy to server
        run: |
          echo "Deploying to production server..."
          # In real deployment, this would SSH to server and run docker-compose
          # docker-compose -f docker-compose.prod.yml up -d
          echo "Deployment complete"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CLOUDINARY_CLOUD: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD }}
