services:
  db:
    image: postgres:15-alpine
    container_name: seven7barber-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seven7barber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-seven7barber}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seven7barber}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./seven7barber-api
      dockerfile: Dockerfile
    container_name: seven7barber-api
    restart: always
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-seven7barber}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seven7barber}?schema=public
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./seven7barber-web
      dockerfile: Dockerfile
    container_name: seven7barber-web
    restart: always
    ports:
      - '${WEB_PORT:-3001}:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
